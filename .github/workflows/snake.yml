name: Generate snake animation

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate-github-snake-contrib:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3.4.1
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-dracula-old.svg?color_snake=#ff79c6&color_dots=#ebedf0,#c8d1fa,#a5b4fc,#8b5cf6,#bd93f9
            dist/snake-dracula.svg?color_snake=#ff79c6&color_dots=#282a36,#44475a,#6272a4,#8be9fd,#bd93f9
            dist/snake-dracula-dark.svg?color_snake=#bd93f9&color_dots=#282a36,#44475a,#6272a4,#8be9fd,#bd93f9
            dist/snake-dracula-snake-purple.svg?color_snake=#bd93f9&color_dots=#282a36,#44475a,#6272a4,#8be9fd,#ff79c6
            dist/snake-dracula-snake-cyan.svg?color_snake=#8be9fd&color_dots=#282a36,#44475a,#6272a4,#bd93f9,#ff79c6
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update Snake Contrib animation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
